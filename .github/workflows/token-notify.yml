name: 디자인 토큰 업데이트 알림

on:
  push:
    branches:
      - 'token_v*'
    paths:
      - 'design-sync/token-sync/tokens/**'

jobs:
  notify-teams:
    runs-on: ubuntu-latest
    steps:
      - name: 변경된 파일 목록 추출
        id: changed
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Teams 알림 전송
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'design-sync/token-sync/tokens/**' | tr '\n' ', ' | sed 's/,$//')
          BRANCH="${{ github.ref_name }}"
          PUSHER="${{ github.actor }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          REPO_URL="https://github.com/${{ github.repository }}"

          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🎨 **디자인 토큰 업데이트**\n\n**브랜치:** \`${BRANCH}\`\n**푸시한 사람:** ${PUSHER}\n**커밋 메시지:** ${COMMIT_MSG}\n**변경 파일:** ${FILES}\n\n[GitHub에서 보기](${REPO_URL}/tree/${BRANCH}/design-sync/token-sync/tokens)\"
            }"
