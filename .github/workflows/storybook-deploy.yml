name: Storybook Deploy

on:
  push:
    branches: [main]
    paths:
      - 'design-sync/src/**'
      - 'design-sync/.storybook/**'
      - 'design-sync/package.json'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: design-sync/package-lock.json

      - name: Install dependencies
        working-directory: design-sync
        run: npm ci

      - name: Build Storybook
        working-directory: design-sync
        run: npm run build-storybook

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./design-sync/storybook-static
          force_orphan: true
